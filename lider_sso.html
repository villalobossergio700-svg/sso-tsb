<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SSO Líder">
<title>Panel Líder SSO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:#1a1a1a}
.app{max-width:520px;margin:0 auto;padding:0 0 32px}
.hdr{background:#1a3a8a;color:#fff;padding:11px 14px 9px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.hdr-logo{height:26px;width:auto}
.hdr-txt .title{font-size:14px;font-weight:700}
.hdr-txt .sub{font-size:10px;opacity:.6;margin-top:1px}
.hdr-bot{display:flex;align-items:center;justify-content:space-between;font-size:11px;opacity:.85}
.rol-badge{background:rgba(106,191,30,.35);border:1px solid #6abf1e;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;color:#fff}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f0f2f5}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
.login-logo{height:34px;margin:0 auto 16px;display:block}
.login-title{font-size:18px;font-weight:700;color:#1a3a8a;margin-bottom:3px}
.login-sub{font-size:12px;color:#999;margin-bottom:22px}
.form-group{margin-bottom:14px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.form-group input{width:100%;padding:12px 13px;border:1.5px solid #e0e4ea;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#f7f8fa;transition:border .2s;-webkit-appearance:none}
.form-group input:focus{border-color:#1a3a8a;background:#fff}
.pin-field{letter-spacing:5px;text-align:center;font-size:18px}
.btn-ingresar{width:100%;padding:14px;background:#1a3a8a;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s;-webkit-appearance:none}
.btn-ingresar:active{opacity:.82}
.btn-ingresar:disabled{opacity:.5;cursor:not-allowed}
.login-note{font-size:11px;color:#aaa;margin-top:12px;line-height:1.5}
.login-note.ok{color:#388e3c;font-weight:600}
.login-note.warn{color:#f57c00;font-weight:600}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8edf5;position:sticky;top:55px;z-index:99}
.tab{flex:1;padding:10px 4px;border:none;background:transparent;font-size:11px;cursor:pointer;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:600;position:relative}
.tab.act{color:#1a3a8a;border-bottom-color:#1a3a8a}
.cnt{position:absolute;top:4px;right:3px;background:#f44336;color:#fff;border-radius:8px;font-size:9px;padding:1px 4px}
.sec{display:none;padding:12px}
.sec.act{display:block}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{padding:6px 12px;border:1.5px solid #e8edf5;border-radius:20px;background:#fff;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;color:#555}
.fbtn.act{background:#1a3a8a;border-color:#1a3a8a;color:#fff}
.tlist{display:flex;flex-direction:column;gap:8px}
.titem{background:#fff;border-radius:12px;padding:13px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #e8edf5}
.titem.eA{border-left-color:#1976d2}
.titem.eT{border-left-color:#388e3c}
.titem.eC{border-left-color:#bbb}
.titem.eV{border-left-color:#c62828}
.ti-head{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.bdg{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-acto{background:#fff3e0;color:#e65100}
.b-cond{background:#e8f5e9;color:#1b5e20}
.b-pos{background:#e3f2fd;color:#0d47a1}
.b-cuasi{background:#fce4ec;color:#880e4f}
.b-num{background:#f0f2f5;color:#555;font-family:monospace;font-size:11px}
.ebdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:auto}
.ebA{background:#e3f2fd;color:#0d47a1}
.ebT{background:#e8f5e9;color:#1b5e20}
.ebC{background:#f0f0f0;color:#666}
.ebV{background:#fce4ec;color:#b71c1c}
.ti-obs{font-size:12px;color:#555;margin-bottom:5px;line-height:1.5}
.ti-meta{font-size:11px;color:#bbb;margin-bottom:4px}
.ti-dias{font-size:11px;font-weight:700;margin-bottom:8px;padding:3px 8px;border-radius:6px;display:inline-block}
.dk{background:#e8f5e9;color:#1b5e20}
.dw{background:#fff3e0;color:#e65100}
.dv{background:#fce4ec;color:#b71c1c}
.acc-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.abtn{padding:7px 13px;border:1.5px solid #e8edf5;border-radius:8px;background:#f7f8fa;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700}
.aT{border-color:#388e3c;color:#1b5e20;background:#e8f5e9}
.aC{border-color:#1a3a8a;color:#1a3a8a;background:#e8eef8}
.aCom{border-color:#f57c00;color:#e65100;background:#fff3e0}
.com-box{margin-top:8px;display:none}
.com-box textarea{width:100%;padding:8px 10px;border:1.5px solid #e8edf5;border-radius:9px;font-size:12px;font-family:inherit;outline:none;resize:none;height:64px;background:#f7f8fa;-webkit-appearance:none}
.com-box button{margin-top:5px;padding:7px 16px;background:#1a3a8a;color:#fff;border:none;border-radius:8px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer}
.card{background:#fff;border-radius:12px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ct{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.st{background:#fff;border-radius:11px;padding:13px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stn{font-size:28px;font-weight:700;color:#1a3a8a}
.stl{font-size:11px;color:#999;margin-top:2px;font-weight:600}
.bw{margin-bottom:10px}
.br{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;font-weight:600}
.bv{color:#aaa;font-weight:500}
.bt{height:7px;background:#f0f2f5;border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .7s ease}
.btn-p{width:100%;padding:13px;background:#1a3a8a;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;display:block;-webkit-appearance:none}
.empty{text-align:center;padding:44px 16px;color:#bbb}
.empty .eico{font-size:44px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
.loading{text-align:center;padding:32px;color:#999;font-size:13px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a3a8a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:500;box-shadow:0 4px 14px rgba(26,58,138,.4)}
.toast.show{opacity:1}
.refresh-btn{padding:8px 14px;border:1.5px solid #1a3a8a;border-radius:8px;background:#fff;color:#1a3a8a;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;margin-bottom:10px;width:100%;display:block;-webkit-appearance:none}
.alerta{background:#fce4ec;border:1.5px solid #ef9a9a;border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:12px;color:#b71c1c;font-weight:600}
.com-prev{background:#f7f9fc;border-left:3px solid #1a3a8a;border-radius:0 7px 7px 0;padding:7px 10px;font-size:11px;color:#555;margin-bottom:6px}
</style>
</head>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
var SURL      = 'https://script.google.com/macros/s/AKfycbxsuMvdXzAhAytikfDXZv6pC28UJiy34I7ZkvJ89o3-w-PwIvRG_poY9LsDIC_6aiqF/exec';
var LOCAL_PIN = '1234';
var LIDERES   = ["Sergio Villalobos", "Franco Zabala", "Administrador"];   // nombres autorizados
var ON_FILE   = (window.location.protocol === 'file:');

// ── ASSETS ──────────────────────────────────────────────────────────────────
var IMGS = JSON.parse(document.getElementById('app-imgs').textContent);

// ── DATOS ────────────────────────────────────────────────────────────────────
var liderNombre = '', todas = [];
var TIPOS  = {acto:'Acto inseguro', cond:'Condici\u00f3n insegura', pos:'Reconocimiento positivo', cuasi:'Cuasi accidente'};
var TIPO_B = {acto:'b-acto', cond:'b-cond', pos:'b-pos', cuasi:'b-cuasi'};

// ── LOGIN SETUP ──────────────────────────────────────────────────────────────
// Si es file://, ocultar el campo PIN - no se puede verificar contra servidor
if (ON_FILE) {
  document.getElementById('pin-group').style.display = 'none';
  document.getElementById('login-note').textContent  = '\u2139\ufe0f Modo local: acceso directo por nombre';
  document.getElementById('login-note').className    = 'login-note ok';
}

document.getElementById('btn-ingresar').addEventListener('click', doLogin);
document.getElementById('inp-lider').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById(ON_FILE?'btn-ingresar':'inp-pin').focus(); });
document.getElementById('inp-pin').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('tab-pend').addEventListener('click', function(){ gTab('pend'); });
document.getElementById('tab-todas').addEventListener('click', function(){ gTab('todas'); });
document.getElementById('tab-ind').addEventListener('click', function(){ gTab('ind'); });

// ── LOGIN ────────────────────────────────────────────────────────────────────
function doLogin() {
  var nombre = document.getElementById('inp-lider').value.trim();
  if (!nombre) { showToast('\u26a0 Ingres\u00e1 tu nombre completo'); return; }

  // Verificar que el nombre esté en la lista de autorizados
  var autorizado = LIDERES.some(function(n){ return n.toLowerCase() === nombre.toLowerCase(); });
  if (!autorizado) {
    showToast('\u26a0 Nombre no autorizado. Contact\u00e1 al administrador.');
    document.getElementById('login-note').textContent = '\u26a0 "' + nombre + '" no est\u00e1 en la lista de l\u00edderes.';
    document.getElementById('login-note').className   = 'login-note warn';
    return;
  }

  // Si es file://, entrar directo (sin red para verificar PIN)
  if (ON_FILE) {
    enterApp(nombre);
    return;
  }

  // Online: verificar PIN contra servidor
  var pin = document.getElementById('inp-pin').value.trim();
  if (!pin) { showToast('\u26a0 Ingres\u00e1 el PIN'); return; }

  var btn = document.getElementById('btn-ingresar');
  btn.textContent = 'Verificando...'; btn.disabled = true;

  api({action:'verificarPin', pin:pin}, function(err, res){
    btn.textContent = 'Ingresar al panel'; btn.disabled = false;
    if (err || !res) {
      // Sin conexión: verificar PIN local
      if (pin === LOCAL_PIN) { enterApp(nombre); return; }
      showToast('\u26a0 Sin conexi\u00f3n al servidor.');
      return;
    }
    if (!res.ok) { showToast('\u26a0 PIN incorrecto'); return; }
    enterApp(nombre);
  });
}

function enterApp(nombre) {
  liderNombre = nombre;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display     = 'block';
  document.getElementById('lider-name').textContent     = nombre.split(' ')[0].toUpperCase();
  cargar();
}

// ── API ──────────────────────────────────────────────────────────────────────
function api(params, cb) {
  var url = SURL+'?', parts = [];
  for (var k in params) parts.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));
  url += parts.join('&');
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){ cb(null, data); })
    .catch(function(e){ cb(e, null); });
}

// ── CARGAR TARJETAS ──────────────────────────────────────────────────────────
function cargar() {
  var pc = document.getElementById('pend-c');
  var tc = document.getElementById('todas-c');
  pc.innerHTML = '<div class="loading">&#8987; Cargando tarjetas...</div>';
  tc.innerHTML = '<div class="loading">&#8987; Cargando...</div>';

  if (ON_FILE && !navigator.onLine) {
    pc.innerHTML = '<div class="empty"><div class="eico">&#128267;</div><p>Abriendo desde archivo sin conexi\u00f3n.<br>Conect\u00e1 a internet y recarg\u00e1 para ver las tarjetas.</p></div>';
    tc.innerHTML = pc.innerHTML;
    return;
  }

  api({action:'listar', rol:'lider'}, function(err, res){
    if (err || !res || !res.ok) {
      pc.innerHTML = '<div class="empty"><div class="eico">&#9888;</div><p>Error al conectar con el servidor.<br>Verific\u00e1 tu conexi\u00f3n a internet.</p></div>';
      tc.innerHTML = pc.innerHTML;
      return;
    }
    todas = res.tarjetas || [];
    document.getElementById('ultima-act').textContent = 'Act: ' + new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    rPend(); rTodas(); updTabs();
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function mapT(t) {
  if (!t) return 'acto';
  if (t.indexOf('Acto') >= 0)    return 'acto';
  if (t.indexOf('Condici') >= 0) return 'cond';
  if (t.indexOf('Recono') >= 0)  return 'pos';
  if (t.indexOf('Cuasi') >= 0)   return 'cuasi';
  return 'acto';
}

function updTabs() {
  var pend = todas.filter(function(t){ return t['Estado']==='Abierta'||t['Estado']==='Vencida'||t['Estado']==='En tratamiento'; });
  document.getElementById('tab-pend').innerHTML = 'Pendientes' + (pend.length ? '<span class="cnt">'+pend.length+'</span>' : '');
}

// ── RENDER PENDIENTES ────────────────────────────────────────────────────────
function rPend() {
  var c    = document.getElementById('pend-c');
  var pend = todas.filter(function(t){ return t['Estado']==='Abierta'||t['Estado']==='Vencida'||t['Estado']==='En tratamiento'; });
  if (!pend.length) { c.innerHTML='<div class="empty"><div class="eico">&#9989;</div><p>No hay tarjetas pendientes.<br>Todo est\u00e1 al d\u00eda.</p></div>'; return; }
  var ve = pend.filter(function(t){ return t['Estado']==='Vencida'; });
  var ab = pend.filter(function(t){ return t['Estado']==='Abierta'; }).length;
  var tr = pend.filter(function(t){ return t['Estado']==='En tratamiento'; }).length;
  var html = '';
  if (ve.length) html += '<div class="alerta">&#9888; '+ve.length+' tarjeta'+(ve.length>1?'s':'')+' vencida'+(ve.length>1?'s':'')+' &#8212; atenci\u00f3n urgente</div>';
  html += '<button class="refresh-btn" id="btn-refp">&#8635; Actualizar</button>';
  html += '<div class="filtros"><button class="fbtn act" data-f="todas">Todas ('+pend.length+')</button>';
  if (ab) html += '<button class="fbtn" data-f="Abierta">Abiertas ('+ab+')</button>';
  if (tr) html += '<button class="fbtn" data-f="En tratamiento">En tratamiento ('+tr+')</button>';
  if (ve.length) html += '<button class="fbtn" data-f="Vencida" style="color:#c62828;border-color:#ef9a9a">Vencidas ('+ve.length+')</button>';
  html += '</div><div class="tlist" id="pend-list">'+pend.map(function(t){ return mkCard(t,true); }).join('')+'</div>';
  c.innerHTML = html;
  document.getElementById('btn-refp').addEventListener('click', cargar);
  c.querySelectorAll('.filtros .fbtn').forEach(function(b){
    b.addEventListener('click', function(){
      var est = this.getAttribute('data-f');
      c.querySelectorAll('.filtros .fbtn').forEach(function(x){ x.classList.remove('act'); });
      this.classList.add('act');
      var pp   = todas.filter(function(t){ return t['Estado']==='Abierta'||t['Estado']==='Vencida'||t['Estado']==='En tratamiento'; });
      var filt = est==='todas' ? pp : pp.filter(function(t){ return t['Estado']===est; });
      document.getElementById('pend-list').innerHTML = filt.map(function(t){ return mkCard(t,true); }).join('');
      wireBtns(document.getElementById('pend-list'));
    });
  });
  wireBtns(c);
}

function rTodas() {
  var c = document.getElementById('todas-c');
  if (!todas.length) { c.innerHTML='<div class="empty"><div class="eico">&#128203;</div><p>No hay tarjetas registradas a\u00fan.</p></div>'; return; }
  c.innerHTML = '<button class="refresh-btn" id="btn-reft">&#8635; Actualizar</button><div class="tlist">' + todas.map(function(t){ return mkCard(t, t['Estado']!=='Cerrada'); }).join('') + '</div>';
  document.getElementById('btn-reft').addEventListener('click', cargar);
  wireBtns(c);
}

function mkCard(t, conAcc) {
  var est  = t['Estado'] || 'Abierta';
  var ec   = est==='Abierta'?'eA':est==='En tratamiento'?'eT':est==='Cerrada'?'eC':'eV';
  var tipo = mapT(t['Tipo']);
  var dias = parseInt(t['diasTranscurridos']) || 0;
  var dc   = dias<3?'dk':dias<7?'dw':'dv';
  var diasTxt = dias===0?'Hoy':dias===1?'1 d\u00eda':dias+' d\u00edas';
  var id   = t['ID']||'';
  var num  = t['N\u00famero']||t['Numero']||'';
  var obs  = (t['Observaci\u00f3n']||t['Observacion']||'').substring(0,130);
  var com  = t['Comentario L\u00edder']||t['Comentario Lider']||'';
  var html = '<div class="titem '+ec+'" data-id="'+id+'">';
  html += '<div class="ti-head"><span class="bdg b-num">#'+('000'+num).slice(-4)+'</span><span class="bdg '+TIPO_B[tipo]+'">'+TIPOS[tipo]+'</span><span class="ebdg eb'+ec.slice(1)+'">'+(est==='En tratamiento'?'En trat.':est)+'</span></div>';
  html += '<div class="ti-meta"><b>'+(t['Observador']||'')+'</b> &middot; '+(t['Unidad Operativa']||'')+' &middot; '+(t['Cliente']||'')+'</div>';
  html += '<div class="ti-obs">'+obs+'</div>';
  html += '<div class="ti-meta">'+(t['\u00c1rea']||t['Area']||'')+(t['Servicio']?' &middot; '+t['Servicio']:'')+'</div>';
  html += '<span class="ti-dias '+dc+'">&#128197; '+diasTxt+' desde la observaci\u00f3n</span>';
  if (com) html += '<div class="com-prev"><b>Comentario:</b> '+com+'</div>';
  if (conAcc) {
    html += '<div class="acc-btns">';
    if (est==='Abierta'||est==='Vencida') html += '<button class="abtn aT btn-tomar">&#9654; Tomar</button>';
    if (est!=='Cerrada') html += '<button class="abtn aC btn-cerrar">&#10003; Cerrar</button>';
    html += '<button class="abtn aCom btn-comentar">&#128172; Comentar</button>';
    html += '</div><div class="com-box"><textarea placeholder="Escrib\u00ed la acci\u00f3n tomada o un comentario..."></textarea><button class="btn-savcom">Guardar</button></div>';
  }
  html += '</div>';
  return html;
}

function wireBtns(container) {
  container.querySelectorAll('.btn-tomar').forEach(function(b){
    b.addEventListener('click', function(){ chEst(this.closest('[data-id]').getAttribute('data-id'),'En tratamiento'); });
  });
  container.querySelectorAll('.btn-cerrar').forEach(function(b){
    b.addEventListener('click', function(){ chEst(this.closest('[data-id]').getAttribute('data-id'),'Cerrada'); });
  });
  container.querySelectorAll('.btn-comentar').forEach(function(b){
    b.addEventListener('click', function(){
      var cb = this.closest('.titem').querySelector('.com-box');
      if (cb) cb.style.display = cb.style.display==='block'?'none':'block';
    });
  });
  container.querySelectorAll('.btn-savcom').forEach(function(b){
    b.addEventListener('click', function(){
      var item = this.closest('.titem');
      var id   = item.getAttribute('data-id');
      var txt  = item.querySelector('.com-box textarea').value.trim();
      if (!txt) { showToast('\u26a0 Escrib\u00ed un comentario'); return; }
      var t = todas.find(function(x){ return x['ID']===id; });
      api({action:'cambiarEstado',id:id,estado:t?t['Estado']:'Abierta',comentario:txt,lider:liderNombre},function(err,res){
        if (err||!res) { showToast('\u26a0 Error al guardar'); return; }
        showToast('\u2713 Comentario guardado');
        item.querySelector('.com-box').style.display='none';
        todas.forEach(function(x){ if(x['ID']===id) x['Comentario L\u00edder']=txt; });
        rPend();
      });
    });
  });
}

function chEst(id, estado) {
  showToast('Actualizando...');
  api({action:'cambiarEstado',id:id,estado:estado,lider:liderNombre},function(err,res){
    if (err||!res||!res.ok) { showToast('\u26a0 Error. Intent\u00e1 de nuevo.'); return; }
    showToast('\u2713 Estado: '+estado);
    todas.forEach(function(t){ if(t['ID']===id) t['Estado']=estado; });
    rPend(); rTodas(); updTabs();
  });
}

function gTab(t) {
  ['pend','todas','ind'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('act',t===x);
    document.getElementById('sec-'+x).classList.toggle('act',t===x);
  });
  if (t==='ind') rInd();
  window.scrollTo(0,0);
}

function rInd() {
  var c = document.getElementById('ind-c');
  if (!todas.length) { c.innerHTML='<div class="empty"><div class="eico">&#128202;</div><p>No hay datos disponibles.</p></div>'; return; }
  var tot=todas.length,ab=0,tr=0,ce=0,ve=0;
  var bT={acto:0,cond:0,pos:0,cuasi:0},bU={},bC={};
  todas.forEach(function(t){
    if(t['Estado']==='Abierta')ab++;else if(t['Estado']==='En tratamiento')tr++;else if(t['Estado']==='Cerrada')ce++;else if(t['Estado']==='Vencida')ve++;
    var tp=mapT(t['Tipo']);bT[tp]=(bT[tp]||0)+1;
    if(t['Unidad Operativa'])bU[t['Unidad Operativa']]=(bU[t['Unidad Operativa']]||0)+1;
    if(t['Cliente'])bC[t['Cliente']]=(bC[t['Cliente']]||0)+1;
  });
  var topU=Object.entries(bU).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var topC=Object.entries(bC).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var html='<div class="sgrid"><div class="st"><div class="stn">'+tot+'</div><div class="stl">Total</div></div><div class="st"><div class="stn" style="color:#c62828">'+ve+'</div><div class="stl">Vencidas</div></div><div class="st"><div class="stn" style="color:#1976d2">'+ab+'</div><div class="stl">Abiertas</div></div><div class="st"><div class="stn" style="color:#388e3c">'+ce+'</div><div class="stl">Cerradas</div></div></div>';
  html+='<div class="card"><div class="ct">Estado de tarjetas</div>'+mkB('Abiertas',ab,tot,'#1976d2')+mkB('En tratamiento',tr,tot,'#388e3c')+mkB('Cerradas',ce,tot,'#888')+mkB('Vencidas',ve,tot,'#c62828')+'</div>';
  html+='<div class="card"><div class="ct">Por tipo de hallazgo</div>'+mkB('Acto inseguro',bT.acto,tot,'#f57c00')+mkB('Condici\u00f3n insegura',bT.cond,tot,'#388e3c')+mkB('Reconocimiento positivo',bT.pos,tot,'#1976d2')+mkB('Cuasi accidente',bT.cuasi,tot,'#c62828')+'</div>';
  if(topU.length)html+='<div class="card"><div class="ct">Por Unidad Operativa</div>'+topU.map(function(e){return mkB(e[0],e[1],tot,'#1a3a8a');}).join('')+'</div>';
  if(topC.length)html+='<div class="card"><div class="ct">Por cliente</div>'+topC.map(function(e){return mkB(e[0],e[1],tot,'#6abf1e');}).join('')+'</div>';
  html+='<button class="btn-p" id="btn-exp">&#128229; Exportar CSV</button><div style="height:12px"></div>';
  c.innerHTML=html;
  document.getElementById('btn-exp').addEventListener('click',expCSV);
}
function mkB(lbl,val,tot,col){var pct=tot>0?Math.round(val/tot*100):0;return '<div class="bw"><div class="br"><span>'+lbl+'</span><span>'+val+' <span class="bv">('+pct+'%)</span></span></div><div class="bt"><div class="bf" style="width:'+pct+'%;background:'+col+'"></div></div></div>';}
function expCSV(){if(!todas.length){showToast('\u26a0 No hay datos');return;}var keys=Object.keys(todas[0]);var rows=[keys];todas.forEach(function(t){rows.push(keys.map(function(k){var v=t[k]||'';return typeof v==='string'&&v.indexOf(',')>=0?'"'+v.replace(/"/g,'""')+'"':v;}));});var csv='\ufeff'+rows.map(function(r){return r.join(',');}).join('\n');var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='tarjetas_sso_'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('\u2713 CSV exportado');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(function(){t.classList.remove('show');},2800);}
</script>
</body>
</html>
